<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Restaurant</h1>
    <nav>
      <ul>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h2>Delicious Food Delivered</h2>
    <p>Order your favorite meals anytime</p>
    <button>Order Now</button>
  </section>

  <section id="menu" class="menu">
    <h2>Our Menu</h2>
    <div class="menu-items">
      <div class="item">
        <h3>Burger</h3>
        <p>$10</p>
      </div>
      <div class="item">
        <h3>Pizza</h3>
        <p>$15</p>
      </div>
      <div class="item">
        <h3>Pasta</h3>
        <p>$12</p>
      </div>
    </div>
  </section>

  <section id="about">
    <h2>About Us</h2>
    <p>We serve fresh and tasty meals made with love.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: contact@restaurant.com</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
